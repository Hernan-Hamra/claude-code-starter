name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test hooks on ${{ matrix.os }} + Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run hooks tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint hooks
        run: ruff check .claude/hooks/ tests/ --select=E,W,F --ignore=E501

  validate-json:
    name: Validate JSON examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate settings.example.json
        run: python -m json.tool .claude/settings.example.json > /dev/null

      - name: Validate tdd-config.example.json
        run: python -m json.tool .claude/tdd-config.example.json > /dev/null

      - name: Validate session-capture.example.json
        run: python -m json.tool .claude/session-capture.example.json > /dev/null
